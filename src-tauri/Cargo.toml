[package]
name = "relay-mcp"
version = "1.0.0"
edition = "2021"
build = "build.rs"
default-run = "relay-gui"
description = "Human feedback layer for AI IDEs"
license = "MIT"
repository = "https://github.com/andeya/ide-relay-mcp"
homepage = "https://github.com/andeya/ide-relay-mcp"

[[bin]]
name = "relay-gui"
path = "src/main.rs"

[[bin]]
name = "relay-server"
path = "src/bin/relay-server.rs"

[[bin]]
name = "relay"
path = "src/bin/relay.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
anyhow = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
directories = "5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
