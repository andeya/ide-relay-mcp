<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relay</title>
    <style>
      /* Critical inline styles: visible before any JS executes — eliminates white flash. */
      html, body { margin: 0; height: 100%; overflow: hidden; }
      body {
        color-scheme: dark;
        background:
          radial-gradient(circle at top left, rgba(74,222,128,.18), transparent 32%),
          radial-gradient(circle at bottom right, rgba(96,165,250,.18), transparent 30%),
          #07111f;
        color: #ecf2ff;
        font-family: "Inter","Segoe UI",system-ui,sans-serif;
      }
      #app:empty + .relay-splash { display: flex; }
      .relay-splash {
        display: none;
        position: fixed; inset: 0;
        align-items: center; justify-content: center;
        flex-direction: column; gap: 14px;
        z-index: 99999;
        pointer-events: none;
      }
      .relay-splash-ring {
        width: 32px; height: 32px;
        border: 3px solid rgba(94,234,212,.18);
        border-top-color: rgba(94,234,212,.72);
        border-radius: 50%;
        animation: relay-spin 1s linear infinite;
      }
      .relay-splash-text {
        font-size: .78rem; color: #64748b;
        letter-spacing: .04em;
      }
      @keyframes relay-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        .relay-splash-ring { animation: none; border-color: rgba(94,234,212,.38); }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="relay-splash" aria-hidden="true">
      <div class="relay-splash-ring"></div>
      <span class="relay-splash-text">Relay</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
