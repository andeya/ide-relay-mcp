# Lint, typecheck, build, and Rust checks on push / PR (not on release tags only).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run version:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  rust:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    name: rust (${{ matrix.label }})
    steps:
      - uses: actions/checkout@v4
      - name: Reject tracked Cargo target dirs
        if: runner.os == 'Linux'
        run: |
          tracked="$(git ls-files 'src-tauri/target' 'target' 2>/dev/null || true)"
          if [ -n "$tracked" ]; then
            echo "Build artifacts must not be committed. Tracked paths:" >&2
            echo "$tracked" >&2
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies (Tauri / GTK / WebKit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: fmt
        if: runner.os == 'Linux'
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --no-deps --all-targets -- -D warnings
      - name: test
        run: cargo test --manifest-path src-tauri/Cargo.toml
